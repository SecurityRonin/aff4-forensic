site_name: aff4-forensic
site_url: https://securityronin.github.io/aff4-forensic/
repo_url: https://github.com/SecurityRonin/aff4-forensic
repo_name: SecurityRonin/aff4-forensic
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Reader Validation: corpus-validation.md
  - Audit Validation: validation.md
  - Implementation Notes: implementation-notes.md
  - Finding Codes: finding-codes.md
  - Privacy Policy: privacy.md
  - Terms of Service: terms.md

exclude_docs: |
  archive/

plugins:
  - search
