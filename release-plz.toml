# release-plz owns crates.io publishing + changelogs + per-crate version bumps for
# this repo's LIBRARY crates — the reader `aff4` (core/) and the analyzer
# `aff4-forensic` (forensic/). It runs on pushes to main (see
# .github/workflows/release-plz.yml):
#   - `release-pr`  opens a human-reviewed version-bump PR (conventional commits)
#   - `release`     publishes any crate whose Cargo.toml version is ahead of
#                   crates.io, in dependency order, and creates its git tag
#
# Both members are published libraries, so neither is release=false.
#
# NOTE: the legacy .github/workflows/release.yml still publishes both crates on a
# manual `v[0-9]*` tag. release-plz now owns library publishing; that release.yml
# is superseded (it only fires on a manual `v…` tag, which release-plz never
# creates — release-plz tags are `aff4-v*` / `aff4-forensic-v*`). Prefer removing
# release.yml to avoid a dual publish path.

[workspace]
# Per-package git tags, e.g. `aff4-v0.2.5`, `aff4-forensic-v0.1.1`. A `<name>-v…`
# tag has a letter, not a digit, after the first `v`, so it never matches a
# `v[0-9]*` binary-release glob.
git_tag_enable = true
# Library crates get a git tag + CHANGELOG entry, not a GitHub Release with assets.
git_release_enable = false
changelog_update = true
# The reader (aff4) and the analyzer (aff4-forensic) version independently.
dependencies_update = false
# Only prepare a release when a real change exists since the last one. release-plz's
# release detection is file-based, so a changelog-only "chore: release" commit
# otherwise re-triggers a release (the churn loop). This allowlist makes
# feat/fix/perf/refactor/doc/revert the only release triggers; chore/ci/test/style/
# build (incl. release-plz's own release commits) never prepare a release.
release_commits = "^(feat|fix|perf|refactor|doc|revert)"

[changelog]
commit_parsers = [
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore: release", skip = true },
    { message = "^feat", group = "added" },
    { message = "^fix", group = "fixed" },
    { message = "^perf", group = "performance" },
    { message = "^refactor", group = "other" },
    { message = "^doc", group = "documentation" },
    { message = "^revert", group = "other" },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    { message = "^chore", skip = true },
    { message = "^.*", group = "other" },
]
