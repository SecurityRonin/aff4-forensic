name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      # Whole workspace: the reader (incl. the real-corpus integration tests over
      # the committed Evimetry images) and the forensic analyzer's audit suite.
      - run: cargo test --workspace

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@c56a35af9328d0bc581dc86c05e58f97f7c38a0e # 1.85
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo test --workspace

  coverage:
    name: Coverage (100% lines, cov:unreachable exempt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-llvm-cov
      # Coverage spans the whole workspace — the reader's read/map/symbolic-fill
      # paths are exercised by the corpus integration tests, not only unit tests.
      # The integration test files themselves are excluded. Every executable
      # library line must be hit at least once; a `// cov:unreachable` marker
      # exempts a provably-dead defensive guard kept to stay panic-free.
      - name: Generate lcov
        run: cargo llvm-cov --workspace --lcov --ignore-filename-regex 'tests/' --output-path lcov.info
      - name: Enforce line coverage (unreachable defensive arms must carry // cov:unreachable)
        shell: bash
        run: |
          fail=0
          while IFS= read -r line; do
            if [[ "$line" == SF:* ]]; then
              f="${line#SF:}"
            elif [[ "$line" =~ ^DA:([0-9]+),0$ ]]; then
              n="${BASH_REMATCH[1]}"
              # The marker may sit on the line itself or the comment directly above
              # (llvm-cov attributes an unreachable statement's zero-hit to either).
              src="$(awk -v ln="$n" 'NR==ln' "$f")"
              prev="$(awk -v ln="$n" 'NR==ln-1' "$f")"
              if [[ "$src" == *cov:unreachable* || "$prev" == *cov:unreachable* ]]; then
                echo "exempt (// cov:unreachable): $f:$n"
              else
                echo "::error::Uncovered line $f:$n:$src"
                fail=1
              fi
            fi
          done < lcov.info
          if [[ "$fail" -ne 0 ]]; then exit 1; fi
          echo "All executable lines covered, or annotated // cov:unreachable."

  fuzz-check:
    name: Fuzz (build check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
          components: rust-src
      - run: cargo install cargo-fuzz --locked
      # cargo-fuzz needs nightly (-Z sanitizer flags); force it past the pinned
      # stable in rust-toolchain.toml with the +nightly command-line override.
      - run: cargo +nightly fuzz build

  secrets:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.tag_name[1:]')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar xz -C /tmp gitleaks
      - name: Run gitleaks
        run: /tmp/gitleaks detect --source .

  geiger:
    name: Unsafe Audit (cargo-geiger)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo install cargo-geiger --locked
      - run: cargo geiger 2>&1 || true

  vet:
    name: Cargo Vet (supply-chain)
    runs-on: ubuntu-latest
    # Complements `deny` (known-bad advisories/licenses) with the supply-chain-
    # injection layer: every dependency version must be human-source-reviewed or
    # covered by an imported aggregate audit set (Google/Mozilla/Bytecode-Alliance/
    # Embark). Config in supply-chain/{config,audits,imports}.toml.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-vet
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-vet
      - name: Fetch dependencies
        run: cargo fetch
      - name: Check supply chain
        run: cargo vet --locked
