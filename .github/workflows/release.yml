name: Release

# Library-only repo: a `v*` tag publishes the two crates to crates.io. The reader
# (`aff4`, core/) is published first because the analyzer (`aff4-forensic`,
# forensic/) depends on it; each is versioned independently, so bump the crate(s)
# you intend to release before tagging. `cargo publish` is a no-op-failure on an
# already-published version — a tag that bumps only one crate releases only that one.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Publish aff4 (reader)
        continue-on-error: true
        run: cargo publish -p aff4
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish aff4-forensic (analyzer)
        continue-on-error: true
        run: cargo publish -p aff4-forensic
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
